name: Deploy Minecraft Server

on:
  workflow_dispatch:

concurrency:
  group: minecraft-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy on Minecraft-NTNH
    runs-on: self-hosted

    env:
      HOME: /root

    steps:
      - name: Pull latest changes and rebuild containers
        shell: bash
        run: |
          set -e

          cd /root/NTNH-Server

          git pull --ff-only
          git lfs install --local --force
          git lfs pull

          cd /root/NTNH-Server/install/docker
          docker compose up -d --build
