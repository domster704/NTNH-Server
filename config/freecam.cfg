# Configuration file

general {
    # [Server Controlled] Camera collision mode: FULL (collide with all blocks), IGNORE_TRANSPARENT (pass through non-opaque blocks), IGNORE_OPENABLE (pass through doors/trapdoors/fence gates), NONE (no collision)
    # Possible values: [FULL, IGNORE_TRANSPARENT, IGNORE_OPENABLE, NONE]
    #  [default: FULL]
    S:collisionMode=FULL

    # Disable freecam when the player takes damage [default: true]
    B:disableOnDamage=true

    # [Server Controlled] Completely disable freecam functionality [default: false]
    B:disabled=false
}


misc {
    # Disable fog when camera is submerged in water or lava [default: false]
    B:disableSubmersionFog=false

    # Enable full brightness while in freecam [default: false]
    B:fullBright=false

    # Camera perspective when entering freecam
    # Possible values: [INSIDE, FIRST_PERSON, THIRD_PERSON, THIRD_PERSON_MIRROR]
    #  [default: INSIDE]
    S:initialPerspective=INSIDE

    # Show the player's hand while in freecam [default: false]
    B:showHand=false
}


movement {
    # Movement mode: STATIC (instant stop) or CREATIVE (momentum/drift)
    # Possible values: [CREATIVE, STATIC]
    #  [default: CREATIVE]
    S:movementMode=CREATIVE

    # Freecam default movement speed [range: 0.2 ~ 10.0, default: 1.0]
    S:speed=1.0
}


