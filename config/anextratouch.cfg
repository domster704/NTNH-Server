# Configuration file

armor {
    # Per-item armor category overrides. Format: "registry_name;category". e.g. "minecraft:iron_chestplate;crystal". Valid categories: light, medium, heavy, crystal. [default: ]
    S:armorCategoryOverrides <
     >

    # Default armor sound category for unknown/modded armor items. Valid: light, medium, heavy, crystal. [default: heavy]
    S:armorDefaultCategory=heavy

    # Entity classes that play armor sounds. Only entities in this list will have armor accent sounds. [default: [Player], [Zombie], [Skeleton], [PigZombie]]
    S:armorSoundEntityWhitelist <
        Player
        Zombie
        Skeleton
        PigZombie
     >

    # How to handle mixed armor. "priority" picks the highest-priority category between chest and legs. "mixed" plays both chest and legs sounds if different. [default: priority]
    S:armorSoundMode=priority

    # Base volume for armor accent sounds. [range: 0.0 ~ 1.0, default: 0.3]
    S:armorSoundVolume=0.3

    # Enable armor accent sounds on footsteps. [default: true]
    B:armorSoundsEnabled=false
}


breath {
    # Above this Y level, breath is always visible regardless of biome temperature. [range: 0 ~ 1000, default: 150]
    I:breathAltitudeThreshold=170

    # Per-entity baby breath position overrides. Format: "mob_name;upOffset;forwardDist". Leave empty to use adult value. [default: ]
    S:breathBabyEntityOverrides <
     >

    # Biomes that always show breath regardless of temperature. Accepts biome names and numeric biome IDs, e.g. "Extreme Hills", "FrozenRiver", "3", "158". [default: ]
    S:breathColdBiomes <
     >

    # Default forward distance for baby entities. [range: -100.0 ~ 100.0, default: 0.0]
    S:breathDefaultBabyForwardDist=0.0

    # Default vertical offset for baby entities. [range: -100.0 ~ 100.0, default: -0.1]
    S:breathDefaultBabyUpOffset=-0.1

    # Default breath mode for dimensions not listed in breathDimensionRules. [default: normal]
    S:breathDefaultDimensionMode=normal

    # Default forward distance along look direction for breath spawn point. [range: -100.0 ~ 100.0, default: 0.3]
    S:breathDefaultForwardDist=0.3

    # Default vertical offset from top of bounding box for breath spawn point. [range: -100.0 ~ 100.0, default: -0.4]
    S:breathDefaultUpOffset=-0.4

    # Per-dimension breath rules. Format: "dimensionId;mode". Modes: "normal" (temperature + altitude checks), "always" (breath always visible), "never" (breath disabled). Unlisted dimensions use breathDefaultDimensionMode. [default: [-1;never], [1;never]]
    S:breathDimensionRules <
        -1;never
        1;never
     >

    # Enable breath particles on entities in cold environments. [default: true]
    B:breathEnabled=true

    # List of mobs which either show breath, or don't, depending on breathEntityClassListIsBlacklist. [default: [Chicken], [SnowMan], [Zombie], [VillagerGolem], [Skeleton], [Creeper], [Enderman]]
    S:breathEntityClassList <
        Chicken
        SnowMan
        Zombie
        VillagerGolem
        Skeleton
        Creeper
        Enderman
     >

    # Whether breathEntityClassList is a blacklist (or a whitelist). [default: true]
    B:breathEntityClassListIsBlacklist=true

    # Per-entity breath position overrides. Format: "mob_name;upOffset;forwardDist". Leave a value empty to use defaults, e.g. "Pig;;0.4". [default: [Pig;-0.3;1.1], [Cow;-0.15;0.85], [Sheep;-0.15;0.85], [MushroomCow;-0.15;0.85], [EntityHorse;-0.3;1.2], [Wolf;-0.2;0.3], [Ozelot;-0.15;0.2], [Villager;-0.4;0.25]]
    S:breathEntityOverrides <
        Pig;-0.3;1.1
        Cow;-0.15;0.85
        Sheep;-0.15;0.85
        MushroomCow;-0.15;0.85
        EntityHorse;-0.3;1.2
        Wolf;-0.2;0.3
        Ozelot;-0.15;0.2
        Villager;-0.4;0.25
     >

    # Maximum distance in blocks at which breath particles are rendered. [range: 1 ~ 1000, default: 64]
    I:breathRenderDistance=64

    # Biome temperature below which breath is visible. Vanilla temps: Ice Plains 0.0, Taiga 0.25, Extreme Hills 0.2, Plains 0.8, Desert 2.0. Temperature also drops with altitude above Y=64. [range: -100.0 ~ 100.0, default: 0.5]
    S:breathTemperatureThreshold=0.5
}


camera {
    # Smoothing factor for third-person camera clipping prevention. 0 = instant snap (vanilla), higher = smoother transitions when the camera hits geometry. [range: 0.0 ~ 1.0, default: 0.5]
    S:cameraClippingSmoothing=0.5

    # Disable camera offsets and shakes while the pause menu is open. [default: true]
    B:cameraDisableWhilePaused=true

    # Duration in seconds for explosion screen shakes. [range: 0.0 ~ 100.0, default: 2.0]
    S:cameraExplosionLength=2.0

    # Trauma intensity for explosion screen shakes. [range: 0.0 ~ 1.0, default: 1.0]
    S:cameraExplosionTrauma=1.5

    # Add a landing screen shake when falling from sufficient height. [default: true]
    B:cameraFallShakeEnabled=true

    # Noise frequency multiplier for landing shake. [range: 0.1 ~ 100.0, default: 0.8]
    S:cameraFallShakeFrequency=0.8

    # Duration in seconds of landing shake. [range: 0.05 ~ 100.0, default: 0.55]
    S:cameraFallShakeLength=0.55

    # Fall distance at which landing shake reaches maximum trauma. [range: 0.1 ~ 1000.0, default: 20.0]
    S:cameraFallShakeMaxDistance=20.0

    # Maximum trauma applied by landing shake. [range: 0.0 ~ 1.0, default: 0.45]
    S:cameraFallShakeMaxTrauma=0.45

    # Minimum fall distance before landing shake starts. [range: 0.0 ~ 1000.0, default: 4.0]
    S:cameraFallShakeMinDistance=4.0

    # Add continuous shake while descending after falling past a threshold. [default: true]
    B:cameraFallingShakeEnabled=true

    # Noise frequency of in-air fall shake. [range: 0.1 ~ 100.0, default: 1.4]
    S:cameraFallingShakeFrequency=1.4

    # Maximum intensity of in-air fall shake. [range: 0.0 ~ 100.0, default: 1.2]
    S:cameraFallingShakeIntensity=1.2

    # Fall distance at which in-air fall shake reaches maximum intensity. [range: 0.1 ~ 1000.0, default: 16.0]
    S:cameraFallingShakeMaxDistance=16.0

    # Minimum fall distance before in-air fall shake starts. [range: 0.0 ~ 1000.0, default: 3.0]
    S:cameraFallingShakeMinDistance=3.0

    # Smooth camera follow in third person. The camera trails behind the player's position instead of being rigidly attached. 0 = instant follow (vanilla), higher = more lag. [range: 0.0 ~ 1.0, default: 0.8]
    S:cameraFollowSmoothing=0.8

    # Camera FOV when in third person view. Only applies when cameraFovOverrideEnabled is true. [range: 30.0 ~ 110.0, default: 70.0]
    S:cameraFovOverride=70.0

    # Override the camera FOV when in third person view. [default: false]
    B:cameraFovOverrideEnabled=false

    # Trauma intensity for hand swing screen shakes. [range: 0.0 ~ 1.0, default: 0.03]
    S:cameraHandSwingTrauma=0.03

    # Keep first-person hand/item stable instead of inheriting camera tilt effects. [default: true]
    B:cameraKeepFirstPersonHandStable=true

    # Enable dynamic camera effects (velocity pitch, strafing roll, turning roll, idle sway). [default: true]
    B:cameraOverhaulEnabled=true

    # Apply camera effects in third person view. [default: true]
    B:cameraOverhaulThirdPerson=true

    # Gradually fade out the player model as the third-person camera gets very close (e.g. clipping against walls). [default: true]
    B:cameraPlayerFadeEnabled=true

    # Camera-to-player distance at which the player is fully invisible. [range: 0.0 ~ 10.0, default: 0.5]
    S:cameraPlayerFadeEndDistance=0.5

    # Camera-to-player distance at which the fade begins. At this distance the player is fully opaque. [range: 0.0 ~ 10.0, default: 1.5]
    S:cameraPlayerFadeStartDistance=1.5

    # Forward velocity pitch factor when riding. [range: 0.0 ~ 100.0, default: 3.5]
    S:cameraRideForwardPitch=3.5

    # Horizontal velocity smoothing factor when riding. [range: 0.0 ~ 100.0, default: 1.0]
    S:cameraRideHorizSmoothing=1.0

    # Strafing roll factor when riding. [range: 0.0 ~ 100.0, default: 5.0]
    S:cameraRideStrafingRoll=5.0

    # Vertical velocity smoothing factor when riding. [range: 0.0 ~ 100.0, default: 1.0]
    S:cameraRideVertSmoothing=1.0

    # Vertical velocity pitch factor when riding. [range: 0.0 ~ 100.0, default: 7.0]
    S:cameraRideVerticalPitch=7.0

    # Maximum frequency of screen shake noise sampling. [range: 0.1 ~ 100.0, default: 6.0]
    S:cameraShakeMaxFrequency=6.0

    # Maximum combined intensity of all active screen shakes. [range: 0.0 ~ 100.0, default: 2.5]
    S:cameraShakeMaxIntensity=2.5

    # Place the audio listener at the camera position instead of the player in third person. Makes positional audio match the camera perspective. [default: true]
    B:cameraSoundCentering=true

    # Sounds that trigger camera shake. Format: "sound=<name>;trauma=<0..1>;radius=<blocks>;frequency=<speed>;duration=<seconds>". Only sound and trauma are required. trauma is scaled by the sound's effective volume (including category/master sliders). radius (default 16) is the distance falloff range. frequency (default 1.0) controls shake speed. duration (default 0.3) is shake length in seconds. Use the sound resource path (e.g. mob.zombie.step) or full name (e.g. minecraft:mob.zombie.step) to only match a specific domain. Examples: "sound=mob.zombie.step;trauma=0.05", "sound=random.explode;trauma=0.8;radius=32;frequency=1.5;duration=2.0". [default: [sound=mob.enderdragon.growl;trauma=0.7;radius=80;frequency=2.0;duration=2.5], [sound=mob.enderdragon.end;trauma=1.0;radius=120;frequency=0.3;duration=11.0], [sound=mob.wither.spawn;trauma=0.5;radius=60;frequency=0.3;duration=2.0], [sound=mob.wither.idle;trauma=0.15;radius=40;frequency=0.5;duration=0.8], [sound=mob.wither.death;trauma=0.7;radius=80;frequency=0.3;duration=2.5], [sound=mob.wither.shoot;trauma=0.1;radius=30;frequency=1.0;duration=0.3]]
    S:cameraSoundShakes <
        sound=mob.enderdragon.growl;trauma=0.7;radius=80;frequency=2.0;duration=2.5
        sound=mob.enderdragon.end;trauma=1.0;radius=120;frequency=0.3;duration=11.0
        sound=mob.wither.spawn;trauma=0.5;radius=60;frequency=0.3;duration=2.0
        sound=mob.wither.idle;trauma=0.15;radius=40;frequency=0.5;duration=0.8
        sound=mob.wither.death;trauma=0.7;radius=80;frequency=0.3;duration=2.5
        sound=mob.wither.shoot;trauma=0.1;radius=30;frequency=1.0;duration=0.3
     >

    # Enable camera shakes triggered by specific sounds. [default: true]
    B:cameraSoundShakesEnabled=true

    # Seconds of inactivity before camera sway begins fading in. [range: 0.0 ~ 100.0, default: 0.15]
    S:cameraSwayFadeInDelay=0.15

    # Duration in seconds for camera sway to fully fade in. [range: 0.0 ~ 100.0, default: 5.0]
    S:cameraSwayFadeInLength=5.0

    # Duration in seconds for camera sway to fade out when the player moves. [range: 0.0 ~ 100.0, default: 0.75]
    S:cameraSwayFadeOutLength=0.75

    # Frequency of idle camera sway oscillation. [range: 0.01 ~ 100.0, default: 0.16]
    S:cameraSwayFrequency=0.16

    # Intensity of idle camera sway. [range: 0.0 ~ 100.0, default: 0.6]
    S:cameraSwayIntensity=0.6

    # Trauma intensity for lightning/thunder screen shakes. [range: 0.0 ~ 1.0, default: 0.05]
    S:cameraThunderTrauma=0.05

    # How quickly turning roll accumulates when rotating the camera. [range: 0.0 ~ 100.0, default: 0.7]
    S:cameraTurningRollAccumulation=0.7

    # Maximum intensity of the turning roll effect. [range: 0.0 ~ 100.0, default: 0.9]
    S:cameraTurningRollIntensity=0.9

    # Smoothing factor for turning roll decay. Higher = slower decay. [range: 0.0 ~ 100.0, default: 1.0]
    S:cameraTurningRollSmoothing=1.0

    # Vertical offset applied to the third-person camera in blocks. Positive values raise the camera, negative lower it. Useful to compensate for mods that alter entity eye height during rendering (e.g. DBC/JBRA). [range: -1.0 ~ 1.0, default: 0.0]
    S:cameraVerticalOffset=0.0

    # Forward velocity pitch factor when walking. [range: 0.0 ~ 100.0, default: 7.0]
    S:cameraWalkForwardPitch=7.0

    # Horizontal velocity smoothing factor when walking. [range: 0.0 ~ 100.0, default: 1.0]
    S:cameraWalkHorizSmoothing=1.0

    # Strafing roll factor when walking. [range: 0.0 ~ 100.0, default: 10.0]
    S:cameraWalkStrafingRoll=10.0

    # Vertical velocity smoothing factor when walking. [range: 0.0 ~ 100.0, default: 0.75]
    S:cameraWalkVertSmoothing=0.75

    # Vertical velocity pitch factor when walking. [range: 0.0 ~ 100.0, default: 4.5]
    S:cameraWalkVerticalPitch=4.5

    # Switch to vanilla first person view when aiming in decoupled camera mode. Gives correct bow/projectile aiming for free. [default: true]
    B:decoupledCameraAimFirstPerson=true

    # Easing curve for the aim transition. Options: linear, ease_in, ease_out, ease_in_out, smooth. [default: smooth]
    S:decoupledCameraAimTransitionEasing=smooth

    # Duration of the aim-to-first-person transition in ticks (20 ticks = 1 second). [range: 1 ~ 40, default: 5]
    I:decoupledCameraAimTransitionTicks=5

    # Item use actions that trigger aiming mode (player body follows camera so projectiles fire at crosshair). Valid values: bow, eat, drink, block, none. [default: [bow]]
    S:decoupledCameraAimingActions <
        bow
     >

    # Items that couple the camera when held (for instant-throw projectiles like snowballs). Player body faces crosshair direction so projectiles fire accurately. Format: "modid:itemname" (any meta), "modid:itemname@N" (exact meta), "modid:itemname@N-M" (meta range). Splash potions use meta 16384-32767. [default: [minecraft:snowball], [minecraft:egg], [minecraft:ender_pearl], [minecraft:ender_eye], [minecraft:experience_bottle], [minecraft:fishing_rod], [minecraft:potion@16384-32767]]
    S:decoupledCameraAimingItems <
        minecraft:snowball
        minecraft:egg
        minecraft:ender_pearl
        minecraft:ender_eye
        minecraft:experience_bottle
        minecraft:fishing_rod
        minecraft:potion@16384-32767
     >

    # Enable decoupled camera when Shoulder Surfing is active. Mouse rotates camera independently of player body. [default: true]
    B:decoupledCameraEnabled=true

    # How fast the camera goes back after releasing alt. 0 = instant snap back, 1 = no decay (offsets persist). [range: 0.0 ~ 1.0, default: 0.5]
    S:decoupledCameraOffsetDecay=0.5

    # How fast the player body turns to face movement direction when decoupled. 0 = no turning, 1 = instant. [range: 0.0 ~ 1.0, default: 0.25]
    S:decoupledCameraPlayerTurnSpeed=0.25

    # How many ticks the player body stays facing the interaction target after attacking or using. 0 = disabled. [range: 0 ~ 100, default: 10]
    I:decoupledCameraTurningLockTicks=10

    # Make F5 toggle between first person and third person back, skipping the third person front view. [default: false]
    B:simplePerspectiveToggle=false
}


debug {
    # Enable debug logging [default: false]
    B:debugMode=false

    # Print all registered mob class names to the log during postInit. Useful for configuring entityClassList and entityOverrides. [default: false]
    B:printMobNames=false
}


footprints {
    # Per-entity baby overrides (absolute values, not multiplied). Format: "mob_class_name;stride;foot_size;stance_width". Leave a value empty to use adult value * baby multiplier. [default: ]
    S:babyEntityOverrides <
     >

    # Multiplier applied to foot size for baby mobs. [range: 0.1 ~ 100.0, default: 0.5]
    S:babyFootSizeMultiplier=0.5

    # Multiplier applied to stance width for baby mobs. [range: 0.1 ~ 100.0, default: 0.5]
    S:babyStanceWidthMultiplier=0.5

    # Multiplier applied to stride for baby mobs. [range: 0.1 ~ 100.0, default: 0.5]
    S:babyStrideMultiplier=0.5

    # Blocks that should never have footprints, regardless of sound type. Use registry names, e.g. "minecraft:tallgrass". [default: ]
    S:blockBlacklist <
     >

    # Per-block opacity overrides (takes priority over sound type). Format: "registry_name;opacity". e.g. "minecraft:snow_layer;0.7". [default: ]
    S:blockOpacityOverrides <
     >

    # Blocks that should always have footprints, even if their sound type is not in the list. Use registry names, e.g. "minecraft:stone". [default: ]
    S:blockWhitelist <
     >

    # Default foot size scale multiplier for the footprint particle. [range: 0.1 ~ 100.0, default: 1.0]
    S:defaultFootSize=1.0

    # Default footprint lifespan in ticks (20 ticks = 1 second). [range: 1 ~ 6000, default: 200]
    I:defaultFootprintLifespan=200

    # Default footprint opacity (0.0 = invisible, 1.0 = fully opaque). [range: 0.0 ~ 100.0, default: 0.4]
    S:defaultFootprintOpacity=0.4

    # Default perpendicular offset between left and right foot in blocks. [range: 0.0 ~ 100.0, default: 0.1]
    S:defaultStanceWidth=0.1

    # Default distance between footprints in blocks. [range: 0.1 ~ 100.0, default: 1.0]
    S:defaultStride=1.0

    # List of mobs which are either leaving footprints, or not, depending on entityClassListIsBlacklist. [default: [Blaze]]
    S:entityClassList <
        Blaze
     >

    # Whether entityClassList is a blacklist (or a whitelist). [default: true]
    B:entityClassListIsBlacklist=true

    # Per-entity overrides. Format: "mob_class_name;stride;foot_size;stance_width". Leave a value empty to use defaults, e.g. "Creeper;;0.5;" [default: ]
    S:entityOverrides <
     >

    # Maximum number of footprint particles tracked at once. 0 = unlimited. [range: 0 ~ 100000, default: 2000]
    I:footprintParticleCap=2000

    # Sound types that allow footprints. Valid values: stone, wood, gravel, grass, cloth, sand, snow, ladder, anvil. [default: [sand], [snow], [grass], [gravel]]
    S:footprintSoundTypes <
        sand
        snow
        grass
        gravel
     >

    # Whether footprint particles are enabled. [default: true]
    B:footprintsEnabled=true

    # Multiplier applied to footprint lifespan when raining at the footprint's position. [range: 0.0 ~ 100.0, default: 0.4]
    S:rainLifespanMultiplier=0.4

    # Multiplier applied to footprint lifespan when snowing at the footprint's position. [range: 0.0 ~ 100.0, default: 0.6]
    S:snowLifespanMultiplier=0.6

    # Per-sound-type lifespan overrides. Format: "sound_type;lifespan_in_ticks". e.g. "snow;100", "sand;300". [default: [snow;100], [sand;300], [grass;200], [gravel;250]]
    S:soundTypeLifespans <
        snow;100
        sand;300
        grass;200
        gravel;250
     >

    # Per-sound-type opacity overrides. Format: "sound_type;opacity". e.g. "snow;0.6", "sand;0.3". [default: [snow;0.6], [sand;0.5], [grass;0.4], [gravel;0.35]]
    S:soundTypeOpacities <
        snow;0.6
        sand;0.5
        grass;0.4
        gravel;0.35
     >
}


misc {
    # Allow Thermal Foundation Blizz mobs to leave a snow trail like vanilla snow golems. [default: true]
    B:blizzSnowTrailEnabled=true

    # Bring back progress bar to the world loading screen. [default: true]
    B:loadingProgressBarEnabled=true
}


rain_splash {
    # Enable rain splash accent sounds on footsteps when walking in rain. [default: true]
    B:rainSplashEnabled=true

    # List of mobs which either play rain splash sounds, or don't, depending on rainSplashEntityClassListIsBlacklist. [default: ]
    S:rainSplashEntityClassList <
     >

    # Whether rainSplashEntityClassList is a blacklist (or a whitelist). [default: true]
    B:rainSplashEntityClassListIsBlacklist=true

    # Base volume for rain splash sounds. Actual volume is scaled by rain intensity. [range: 0.0 ~ 1.0, default: 0.15]
    S:rainSplashVolume=0.15
}


smooth_gui {
    # Direction the GUI slides in from. "DOWN" slides up from below, "UP" slides down from above. [default: DOWN]
    S:smoothGuiAnimationDirection=DOWN

    # Animation intensity multiplier. Higher values = larger displacement. [range: 0.0 ~ 100.0, default: 1.0]
    S:smoothGuiAnimationScale=1.0

    # Easing curve for the animation. "BACK" has a slight overshoot bounce, "CUBIC" is a simple smooth curve. [default: BACK]
    S:smoothGuiAnimationStyle=BACK

    # Animation duration in milliseconds. [range: 10 ~ 10000, default: 220]
    I:smoothGuiAnimationTime=220

    # Background fade duration in milliseconds. [range: 1 ~ 10000, default: 85]
    I:smoothGuiBackgroundFadeTime=85

    # Enable smooth GUI opening animations (slide-in and background fade). [default: true]
    B:smoothGuiEnabled=true

    # GUI screen classes that should not be animated. Can be simple names (e.g. "GuiChat") or fully qualified (e.g. "net.minecraft.client.gui.GuiChat"). [default: [GuiChat], [GuiDownloadTerrain], [GuiMemoryErrorScreen], [GuiGameOver], [GuiMainMenu]]
    S:smoothGuiExcludedScreens <
        GuiChat
        GuiDownloadTerrain
        GuiMemoryErrorScreen
        GuiGameOver
        GuiMainMenu
     >

    # Fade in the dark background overlay when opening GUIs in-world. [default: true]
    B:smoothGuiFadeBackground=true
}


trampling {
    # Blocks that can be trampled. Use registry names, e.g. "minecraft:tallgrass". [default: [minecraft:tallgrass], [minecraft:double_plant], [minecraft:deadbush]]
    S:tramplingBlocks <
        minecraft:tallgrass
        minecraft:double_plant
        minecraft:deadbush
     >

    # Enable grass/plant trampling. Blocks walked through repeatedly will break after a random number of passes. [default: false]
    B:tramplingEnabled=true

    # Entity classes that trample blocks (or are excluded, depending on tramplingEntityClassListIsBlacklist). Use entity class names, e.g. "Player", "Zombie", "Cow". [default: [Player]]
    S:tramplingEntityClassList <
        Player
     >

    # Whether tramplingEntityClassList is a blacklist (true) or whitelist (false). [default: false]
    B:tramplingEntityClassListIsBlacklist=false

    # Minutes before the tracker forgets about a block that hasn't been walked through. [range: 1 ~ 60, default: 5]
    I:tramplingForgetTime=5

    # Maximum number of passes before a block breaks. A random threshold between min and max is chosen per block. [range: 1 ~ 100, default: 8]
    I:tramplingMaxPasses=8

    # Minimum number of passes before a block breaks. [range: 1 ~ 100, default: 3]
    I:tramplingMinPasses=3
}


wetness {
    # Enable water drip particles when entities exit water or stand in rain. [default: true]
    B:wetParticlesEnabled=true

    # Multiplier for how long entities stay wet after leaving water. Higher values = longer dripping. 1.0 = default (~65 seconds from fully soaked). [range: 0.1 ~ 100.0, default: 1.0]
    S:wetnessDuration=1.0

    # List of mobs which either show wetness particles, or don't, depending on wetnessEntityClassListIsBlacklist. [default: ]
    S:wetnessEntityClassList <
     >

    # Whether wetnessEntityClassList is a blacklist (or a whitelist). [default: true]
    B:wetnessEntityClassListIsBlacklist=true

    # Multiplier for particle spawn frequency. Higher values = more water drops. [range: 0.1 ~ 100.0, default: 1.0]
    S:wetnessParticleDensity=1.0

    # Whether standing in rain causes wetness buildup. [default: true]
    B:wetnessRainEnabled=true
}


